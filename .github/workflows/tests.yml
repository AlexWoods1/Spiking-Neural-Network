name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"
      - name: Install dependencies
        run: uv sync --group dev
      - name: Run pytest with coverage
        run: uv run pytest
      - name: Run basedpyright
        run: uv run basedpyright
