name: Black Linter

on:
  push:
  pull_request:

jobs:
  black-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check code formatting with Black
        uses: psf/black@stable
        with:
          options: "--check --verbose"
          version: "~= 26.0" 
